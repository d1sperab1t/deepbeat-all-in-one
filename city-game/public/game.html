<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>落跑计划 — DEEPBEAT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/game.css">
</head>
<body>

<!-- Mountain Background -->
<div class="mountain-bg">
  <svg viewBox="0 0 1440 400" preserveAspectRatio="none" fill="#F6F1E9">
    <path d="M0,400 L0,280 Q120,180 240,220 Q360,260 420,200 Q480,140 540,160 Q600,180 660,120 Q720,60 780,100 Q840,140 900,80 Q960,20 1020,60 Q1080,100 1140,140 Q1200,180 1260,100 Q1320,20 1380,80 L1440,40 L1440,400 Z"/>
    <path d="M0,400 L0,320 Q180,240 360,280 Q540,320 660,260 Q780,200 900,240 Q1020,280 1140,200 Q1260,120 1440,160 L1440,400 Z" opacity="0.5"/>
  </svg>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Unlock Overlay -->
<div class="unlock-overlay" id="unlockOverlay">
  <div class="unlock-icon">🔓</div>
  <div class="unlock-text" id="unlockText">新阶段已解锁</div>
  <div class="unlock-sub" id="unlockSub">新的任务已到来</div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav" id="bottomNav">
  <div class="nav-items">
    <button class="nav-item" id="navPlay" onclick="gameRouter.navigate('#/play')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <path d="M9 12h6M12 9v6"/>
      </svg>
      主界面
    </button>
    <button class="nav-item" id="navClues" onclick="gameRouter.navigate('#/clues')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <path d="M14 2v6h6M9 13h6M9 17h4"/>
      </svg>
      线索夹
    </button>
    <button class="nav-item" id="navHistory" onclick="gameRouter.navigate('#/history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 6v6l4 2"/>
      </svg>
      历程
    </button>
  </div>
</nav>

<!-- App Root -->
<div id="game-app">
  <div class="game-loading">
    <div class="spinner"></div>
    加载中...
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/router.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/game-app.js"></script>
</body>
</html>
